name: .NET Core Test and Publish

on:
  push:
    branches: [auto-release]
  pull_request:

env:
  DOTNET_VERSION: 10.0.x

jobs:

  Test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Check format
      if: runner.os == 'Linux'
      run: dotnet format --no-restore --verify-no-changes --verbosity diagnostic
    - name: Build CLI
      if: runner.os == 'Linux'
      run: |
        dotnet publish -o ./out -c Release src/Neo.CLI
        find ./out -name 'config.json' | xargs perl -pi -e 's|LevelDBStore|MemoryStore|g'
    - name: Install dependencies
      if: runner.os == 'Linux'
      run: sudo apt-get install libleveldb-dev expect
    - name: Run tests with expect
      if: runner.os == 'Linux'
      run: expect ./.github/workflows/test-neo-cli.expect
    - name: Run Unit Tests
      if: runner.os == 'Windows'
      run: |
        forfiles /p tests /m *.csproj /s /c "cmd /c dotnet add @PATH package coverlet.msbuild"
        dotnet test /p:CollectCoverage=true /p:CoverletOutput='${{ github.workspace }}/TestResults/coverage/' /p:MergeWith='${{ github.workspace }}/TestResults/coverage/coverage.json' /p:CoverletOutputFormat=lcov%2cjson -m:1
    - name: Coveralls
      if: runner.os == 'Windows'
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        format: lcov
        file: ${{ github.workspace }}/TestResults/coverage/coverage.info

  Test-with-plugins:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Build CLI
      run: |
        dotnet build -c Release
        dotnet publish -o ./out -c Release src/Neo.CLI
    - name: Create Plugins folder and copy plugin DLLs
      run: |
        mkdir -p ./out/Plugins
        for plugin_dir in plugins/*/; do
          plugin_name=$(basename "$plugin_dir")
          build_output="$plugin_dir/bin/Release/net10.0"
          if [ -d "$build_output" ]; then
            mkdir -p "./out/Plugins/$plugin_name"
            cp -r "$build_output"/* "./out/Plugins/$plugin_name/"
          else
            echo "Warning: Build output not found for $plugin_name"
          fi
        done
        # Remove duplicated RpcServer.dll from TokensTracker and StorageDumper (they can't load twice)
        rm -f ./out/Plugins/TokensTracker/RpcServer.dll
        rm -f ./out/Plugins/StateService/RpcServer.dll
    - name: Install dependencies
      run: sudo apt-get install libleveldb-dev expect
    - name: Debug - List Plugins folder contents
      run: |
        echo "Plugins folder contents:"
        ls -la ./out/Plugins/ || echo "Plugins folder does not exist"
        echo ""
        echo "Plugin directories:"
        find ./out/Plugins -mindepth 1 -maxdepth 1 -type d | sort || echo "No plugin directories found"
        echo ""
        echo "Sample plugin DLLs (ApplicationLogs):"
        ls -la ./out/Plugins/ApplicationLogs/*.dll 2>/dev/null | head -5 || echo "No DLLs found"
    - name: Run tests with expect
      run: expect ./.github/workflows/test-neo-cli-plugins.expect
      
  Release:
    if: github.ref == 'refs/heads/auto-release' && github.repository == 'superboyiii/neo-node'
    needs: Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - name: Verify branch
      run: |
        if [ "${{ github.ref }}" != "refs/heads/auto-release" ]; then
          echo "Error: This workflow only runs on auto-release branch"
          exit 1
        fi
        echo "Running on auto-release branch ✓"
    - name: Get version
      id: get_version
      run: |
        sudo apt install xmlstarlet
        # Check for Version in src/Directory.Build.props (for official release)
        VERSION=$(xmlstarlet sel -N i=http://schemas.microsoft.com/developer/msbuild/2003 -t -v "//i:Version/text()" src/Directory.Build.props 2>/dev/null || echo "")
        if [ -z "$VERSION" ]; then
          # Fallback to plugins/Directory.Build.props
          VERSION=$(find plugins -name Directory.Build.props | xargs xmlstarlet sel -N i=http://schemas.microsoft.com/developer/msbuild/2003 -t -v "//i:Version/text()" 2>/dev/null || echo "")
        fi
        if [ -n "$VERSION" ]; then
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
        else
          echo "version=" >> $GITHUB_OUTPUT
        fi
    - name: Check tag
      if: steps.get_version.outputs.version != '' && startsWith(steps.get_version.outputs.version, 'v')
      id: check_tag
      run: curl -s -I ${{ format('https://github.com/{0}/releases/tag/{1}', github.repository, steps.get_version.outputs.version) }} | head -n 1 | cut -d$' ' -f2 | xargs printf "statusCode=%s" | xargs echo >> $GITHUB_OUTPUT
    - name: Create release
      if: steps.check_tag.outputs.statusCode == '404'
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        release_name: ${{ steps.get_version.outputs.version }}
        draft: true
        prerelease: ${{ contains(steps.get_version.outputs.version, '-') }}
    - name: Setup .NET Core
      if: steps.check_tag.outputs.statusCode == '404'
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Install zip tool
      if: steps.check_tag.outputs.statusCode == '404'
      run: sudo apt-get update && sudo apt-get install -y zip
    - name: Build LevelDBStore plugin for all platforms
      if: steps.check_tag.outputs.statusCode == '404'
      run: |
        # Build LevelDBStore plugin to download native libraries for all platforms
        dotnet build plugins/LevelDBStore/LevelDBStore.csproj -c Release
        
        # Find the actual IntermediateOutputPath by checking where native libs were downloaded
        echo "Checking native library locations..."
        find plugins/LevelDBStore -name "libleveldb.*" -type f 2>/dev/null | head -5 || echo "Native libs not found yet"
    - name: Build and package neo-cli for all platforms
      if: steps.check_tag.outputs.statusCode == '404'
      run: |
        # Define platforms
        platforms=("portable" "linux-x64" "linux-arm64" "win-x64" "osx-x64" "osx-arm64")
        
        # Find LevelDBStore native library base path
        LEVELDB_BASE="plugins/LevelDBStore/bin/Release/net10.0/obj/LevelDBStore"
        
        for platform in "${platforms[@]}"; do
          echo "Building neo-cli for $platform..."
          
          if [ "$platform" == "portable" ]; then
            # Portable version - no RID specified
            dotnet publish src/Neo.CLI/Neo.CLI.csproj -c Release -o "./publish/$platform" --self-contained false
          else
            # Platform-specific versions
            dotnet publish src/Neo.CLI/Neo.CLI.csproj -c Release -o "./publish/$platform" -r "$platform" --self-contained true
          fi
          
          # Create Plugins/LevelDBStore directory
          mkdir -p "./publish/$platform/Plugins/LevelDBStore"
          
          # Copy LevelDBStore.dll
          LEVELDB_DLL_SOURCE="plugins/LevelDBStore/bin/Release/net10.0/LevelDBStore.dll"
          if [ -f "$LEVELDB_DLL_SOURCE" ]; then
            cp "$LEVELDB_DLL_SOURCE" "./publish/$platform/Plugins/LevelDBStore/LevelDBStore.dll"
            echo "Copied LevelDBStore.dll for $platform"
          else
            echo "Warning: LevelDBStore.dll not found at $LEVELDB_DLL_SOURCE"
          fi
          
          # Copy native libraries
          if [ "$platform" == "portable" ]; then
            # Portable: copy linux-x64, win-x64, osx-x64 to runtimes directory
            for portable_rid in "linux-x64" "win-x64" "osx-x64"; do
              NATIVE_LIB_DIR="$LEVELDB_BASE/libleveldb-$portable_rid/runtimes/$portable_rid/native"
              case "$portable_rid" in
                "linux-x64")
                  if [ -f "$NATIVE_LIB_DIR/libleveldb.so" ]; then
                    mkdir -p "./publish/$platform/runtimes/$portable_rid/native"
                    cp "$NATIVE_LIB_DIR/libleveldb.so" "./publish/$platform/runtimes/$portable_rid/native/"
                    echo "Copied libleveldb.so for portable/$portable_rid"
                  else
                    echo "Warning: libleveldb.so not found at $NATIVE_LIB_DIR/libleveldb.so"
                  fi
                  ;;
                "win-x64")
                  if [ -f "$NATIVE_LIB_DIR/libleveldb.dll" ]; then
                    mkdir -p "./publish/$platform/runtimes/$portable_rid/native"
                    cp "$NATIVE_LIB_DIR/libleveldb.dll" "./publish/$platform/runtimes/$portable_rid/native/"
                    echo "Copied libleveldb.dll for portable/$portable_rid"
                  else
                    echo "Warning: libleveldb.dll not found at $NATIVE_LIB_DIR/libleveldb.dll"
                  fi
                  ;;
                "osx-x64")
                  if [ -f "$NATIVE_LIB_DIR/libleveldb.dylib" ]; then
                    mkdir -p "./publish/$platform/runtimes/$portable_rid/native"
                    cp "$NATIVE_LIB_DIR/libleveldb.dylib" "./publish/$platform/runtimes/$portable_rid/native/"
                    echo "Copied libleveldb.dylib for portable/$portable_rid"
                  else
                    echo "Warning: libleveldb.dylib not found at $NATIVE_LIB_DIR/libleveldb.dylib"
                  fi
                  ;;
              esac
            done
          else
            # Platform-specific: copy corresponding native library to root directory
            NATIVE_LIB_DIR="$LEVELDB_BASE/libleveldb-$platform/runtimes/$platform/native"
            case "$platform" in
              "linux-x64"|"linux-arm64")
                if [ -f "$NATIVE_LIB_DIR/libleveldb.so" ]; then
                  cp "$NATIVE_LIB_DIR/libleveldb.so" "./publish/$platform/"
                  echo "Copied libleveldb.so for $platform"
                else
                  echo "Warning: libleveldb.so not found at $NATIVE_LIB_DIR/libleveldb.so"
                fi
                ;;
              "win-x64")
                if [ -f "$NATIVE_LIB_DIR/libleveldb.dll" ]; then
                  cp "$NATIVE_LIB_DIR/libleveldb.dll" "./publish/$platform/"
                  echo "Copied libleveldb.dll for $platform"
                else
                  echo "Warning: libleveldb.dll not found at $NATIVE_LIB_DIR/libleveldb.dll"
                fi
                ;;
              "osx-x64"|"osx-arm64")
                if [ -f "$NATIVE_LIB_DIR/libleveldb.dylib" ]; then
                  cp "$NATIVE_LIB_DIR/libleveldb.dylib" "./publish/$platform/"
                  echo "Copied libleveldb.dylib for $platform"
                else
                  echo "Warning: libleveldb.dylib not found at $NATIVE_LIB_DIR/libleveldb.dylib"
                fi
                ;;
            esac
          fi
          
          # Create zip package
          cd "./publish/$platform"
          zip -r "../../neo-cli-$platform.zip" .
          cd ../..
          echo "Created neo-cli-$platform.zip"
        done
    - name: Upload CLI packages to release
      if: steps.check_tag.outputs.statusCode == '404'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./neo-cli-portable.zip
        asset_name: neo-cli-portable.zip
        asset_content_type: application/zip
    - name: Upload CLI packages to release - linux-x64
      if: steps.check_tag.outputs.statusCode == '404'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./neo-cli-linux-x64.zip
        asset_name: neo-cli-linux-x64.zip
        asset_content_type: application/zip
    - name: Upload CLI packages to release - linux-arm64
      if: steps.check_tag.outputs.statusCode == '404'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./neo-cli-linux-arm64.zip
        asset_name: neo-cli-linux-arm64.zip
        asset_content_type: application/zip
    - name: Upload CLI packages to release - win-x64
      if: steps.check_tag.outputs.statusCode == '404'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./neo-cli-win-x64.zip
        asset_name: neo-cli-win-x64.zip
        asset_content_type: application/zip
    - name: Upload CLI packages to release - osx-x64
      if: steps.check_tag.outputs.statusCode == '404'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./neo-cli-osx-x64.zip
        asset_name: neo-cli-osx-x64.zip
        asset_content_type: application/zip
    - name: Upload CLI packages to release - osx-arm64
      if: steps.check_tag.outputs.statusCode == '404'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./neo-cli-osx-arm64.zip
        asset_name: neo-cli-osx-arm64.zip
        asset_content_type: application/zip
