name: .NET Core Test and Publish

on:
  push:
    branches: [auto-release]
  pull_request:

env:
  DOTNET_VERSION: 10.0.x

jobs:

  Test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Check format
      if: runner.os == 'Linux'
      run: dotnet format --no-restore --verify-no-changes --verbosity diagnostic
    - name: Build CLI
      if: runner.os == 'Linux'
      run: |
        dotnet publish -o ./out -c Release src/Neo.CLI
        find ./out -name 'config.json' | xargs perl -pi -e 's|LevelDBStore|MemoryStore|g'
    - name: Install dependencies
      if: runner.os == 'Linux'
      run: sudo apt-get install libleveldb-dev expect
    - name: Run tests with expect
      if: runner.os == 'Linux'
      run: expect ./.github/workflows/test-neo-cli.expect
    - name: Run Unit Tests
      if: runner.os == 'Windows'
      run: |
        forfiles /p tests /m *.csproj /s /c "cmd /c dotnet add @PATH package coverlet.msbuild"
        dotnet test /p:CollectCoverage=true /p:CoverletOutput='${{ github.workspace }}/TestResults/coverage/' /p:MergeWith='${{ github.workspace }}/TestResults/coverage/coverage.json' /p:CoverletOutputFormat=lcov%2cjson -m:1
    - name: Coveralls
      if: runner.os == 'Windows'
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        format: lcov
        file: ${{ github.workspace }}/TestResults/coverage/coverage.info

  Test-with-plugins:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Build CLI
      run: |
        dotnet build -c Release
        dotnet publish -o ./out -c Release src/Neo.CLI
    - name: Create Plugins folder and copy plugin DLLs
      run: |
        mkdir -p ./out/Plugins
        for plugin_dir in plugins/*/; do
          plugin_name=$(basename "$plugin_dir")
          build_output="$plugin_dir/bin/Release/net10.0"
          if [ -d "$build_output" ]; then
            mkdir -p "./out/Plugins/$plugin_name"
            cp -r "$build_output"/* "./out/Plugins/$plugin_name/"
          else
            echo "Warning: Build output not found for $plugin_name"
          fi
        done
        # Remove duplicated RpcServer.dll from TokensTracker and StorageDumper (they can't load twice)
        rm -f ./out/Plugins/TokensTracker/RpcServer.dll
        rm -f ./out/Plugins/StateService/RpcServer.dll
    - name: Install dependencies
      run: sudo apt-get install libleveldb-dev expect
    - name: Debug - List Plugins folder contents
      run: |
        echo "Plugins folder contents:"
        ls -la ./out/Plugins/ || echo "Plugins folder does not exist"
        echo ""
        echo "Plugin directories:"
        find ./out/Plugins -mindepth 1 -maxdepth 1 -type d | sort || echo "No plugin directories found"
        echo ""
        echo "Sample plugin DLLs (ApplicationLogs):"
        ls -la ./out/Plugins/ApplicationLogs/*.dll 2>/dev/null | head -5 || echo "No DLLs found"
    - name: Run tests with expect
      run: expect ./.github/workflows/test-neo-cli-plugins.expect
      
  Release:
    if: github.ref == 'refs/heads/auto-release' && github.repository == 'superboyiii/neo-node'
    needs: Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - name: Get version
      id: get_version
      run: |
        sudo apt install xmlstarlet -qq
        VERSION=$(xmlstarlet sel -N i=http://schemas.microsoft.com/developer/msbuild/2003 -t -v "//i:Version/text()" src/Directory.Build.props 2>/dev/null || echo "")
        [ -z "$VERSION" ] && VERSION=$(find plugins -name Directory.Build.props | xargs xmlstarlet sel -N i=http://schemas.microsoft.com/developer/msbuild/2003 -t -v "//i:Version/text()" 2>/dev/null || echo "")
        [ -n "$VERSION" ] && echo "version=v$VERSION" >> $GITHUB_OUTPUT || echo "version=" >> $GITHUB_OUTPUT
    - name: Check tag
      if: steps.get_version.outputs.version != '' && startsWith(steps.get_version.outputs.version, 'v')
      id: check_tag
      run: curl -s -I ${{ format('https://github.com/{0}/releases/tag/{1}', github.repository, steps.get_version.outputs.version) }} | head -n 1 | cut -d$' ' -f2 | xargs printf "statusCode=%s" | xargs echo >> $GITHUB_OUTPUT
    - name: Create release
      if: steps.check_tag.outputs.statusCode == '404'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if ! gh release view ${{ steps.get_version.outputs.version }} >/dev/null 2>&1; then
          if [[ "${{ steps.get_version.outputs.version }}" == *"-"* ]]; then
            gh release create ${{ steps.get_version.outputs.version }} \
              --title "${{ steps.get_version.outputs.version }}" \
              --notes "Release ${{ steps.get_version.outputs.version }}" \
              --draft \
              --prerelease
          else
            gh release create ${{ steps.get_version.outputs.version }} \
              --title "${{ steps.get_version.outputs.version }}" \
              --notes "Release ${{ steps.get_version.outputs.version }}" \
              --draft
          fi
        fi
    - name: Setup .NET Core
      if: steps.check_tag.outputs.statusCode == '404'
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Install zip tool
      if: steps.check_tag.outputs.statusCode == '404'
      run: sudo apt-get update && sudo apt-get install -y zip
    - name: Build LevelDBStore plugin for all platforms
      if: steps.check_tag.outputs.statusCode == '404'
      run: |
        dotnet build plugins/LevelDBStore/LevelDBStore.csproj -c Release
    - name: Build and package neo-cli for all platforms
      if: steps.check_tag.outputs.statusCode == '404'
      run: |
        # Define platforms
        platforms=("portable" "linux-x64" "linux-arm64" "win-x64" "osx-x64" "osx-arm64")
        
        # LevelDBStore output directory (where native libs are copied after build)
        LEVELDB_OUTPUT="plugins/LevelDBStore/bin/Release/net10.0"
        # LevelDBStore intermediate directory (where native libs are downloaded)
        LEVELDB_OBJ="plugins/LevelDBStore/bin/Release/net10.0/obj/LevelDBStore"
        
        copy_native_lib() {
          local rid=$1
          local lib_name=$2
          local target_dir=$3
          local output_path="$LEVELDB_OUTPUT/runtimes/$rid/native/$lib_name"
          local obj_path="$LEVELDB_OBJ/libleveldb-$rid/runtimes/$rid/native/$lib_name"
          local zip_dir="$LEVELDB_OBJ/libleveldb-$rid"
          
          if [ -f "$output_path" ]; then
            cp "$output_path" "$target_dir/"
          elif [ -f "$obj_path" ]; then
            cp "$obj_path" "$target_dir/"
          else
            return
          fi
          
          # For macOS, copy all .dylib files from the zip package (including dependencies)
          if [[ "$rid" == osx-* ]] && [ -d "$zip_dir" ]; then
            find "$zip_dir" -name "*.dylib" -type f -exec cp {} "$target_dir/" \; 2>/dev/null || true
          fi
        }
        
        # Download gperftools libraries from Homebrew bottles for macOS
        download_gperftools() {
          local rid=$1
          local target_dir=$2
          
          echo "Checking gperftools for $rid..."
          
          if [[ "$rid" != osx-* ]]; then
            echo "  Skipping: not macOS platform"
            return
          fi
          
          # Check if libtcmalloc already exists
          if ls "$target_dir"/libtcmalloc*.dylib 1>/dev/null 2>&1; then
            echo "  libtcmalloc already exists in target directory"
            ls -lh "$target_dir"/libtcmalloc*.dylib
            return
          fi
          
          # Install jq if not available
          if ! command -v jq >/dev/null 2>&1; then
            echo "  Installing jq..."
            sudo apt-get install -y jq >/dev/null 2>&1 || { echo "  Failed to install jq"; return; }
          fi
          
          # Get bottle URL from Homebrew API
          echo "  Fetching bottle URL from Homebrew API..."
          API_RESPONSE=$(curl -s "https://formulae.brew.sh/api/formula/gperftools.json" 2>&1)
          
          if [ $? -ne 0 ] || [ -z "$API_RESPONSE" ]; then
            echo "  Failed to fetch API response"
            echo "  API response: $API_RESPONSE"
            return
          fi
          
          # Check available bottle keys
          echo "  Available bottle keys:"
          echo "$API_RESPONSE" | jq -r '.bottles.stable | keys[]' 2>/dev/null | head -5 || echo "  Could not parse bottle keys"
          
          # Try to get bottle URL
          if [[ "$rid" == "osx-arm64" ]]; then
            BOTTLE_URL=$(echo "$API_RESPONSE" | jq -r '.bottles.stable | to_entries[] | select(.key | contains("arm64")) | .value.url' 2>/dev/null | head -1) || true
          else
            BOTTLE_URL=$(echo "$API_RESPONSE" | jq -r '.bottles.stable | to_entries[] | select(.key | contains("x86_64") or contains("intel")) | .value.url' 2>/dev/null | head -1) || true
          fi
          
          if [ -z "$BOTTLE_URL" ] || [ "$BOTTLE_URL" == "null" ] || [ "$BOTTLE_URL" == "" ]; then
            echo "  Failed to get bottle URL from Homebrew API"
            echo "  Trying alternative method..."
            # Alternative: try direct key access
            if [[ "$rid" == "osx-arm64" ]]; then
              BOTTLE_URL=$(echo "$API_RESPONSE" | jq -r '.bottles.stable.arm64_monterey.url // .bottles.stable.arm64_big_sur.url // .bottles.stable.arm64_sonoma.url // .bottles.stable.arm64_ventura.url // empty' 2>/dev/null) || true
            else
              BOTTLE_URL=$(echo "$API_RESPONSE" | jq -r '.bottles.stable.x86_64_monterey.url // .bottles.stable.x86_64_big_sur.url // .bottles.stable.x86_64_sonoma.url // .bottles.stable.x86_64_ventura.url // empty' 2>/dev/null) || true
            fi
          fi
          
          if [ -z "$BOTTLE_URL" ] || [ "$BOTTLE_URL" == "null" ] || [ "$BOTTLE_URL" == "" ]; then
            echo "  Failed to get bottle URL after trying all methods"
            return
          fi
          
          echo "  Bottle URL: $BOTTLE_URL"
          
          # Download and extract bottle
          mkdir -p /tmp/gperftools-bottle
          cd /tmp/gperftools-bottle
          echo "  Downloading bottle..."
          if ! curl -L -f -o gperftools.tar.gz "$BOTTLE_URL" 2>&1; then
            echo "  Failed to download bottle"
            cd - >/dev/null
            rm -rf /tmp/gperftools-bottle
            return
          fi
          
          echo "  Extracting bottle..."
          if ! tar -xzf gperftools.tar.gz 2>&1; then
            echo "  Failed to extract bottle"
            cd - >/dev/null
            rm -rf /tmp/gperftools-bottle
            return
          fi
          
          echo "  Searching for libtcmalloc libraries..."
          find . -name "libtcmalloc*.dylib" -type f -o -type l | while read -r lib_file; do
            echo "    Found: $lib_file"
            if [ -L "$lib_file" ]; then
              real_file=$(readlink -f "$lib_file" 2>/dev/null || readlink "$lib_file" 2>/dev/null)
              echo "      Symbolic link -> $real_file"
              if [ -f "$real_file" ]; then
                cp "$real_file" "$target_dir/" && echo "      Copied: $(basename "$real_file")" || echo "      Failed to copy: $real_file"
              fi
            else
              cp "$lib_file" "$target_dir/" && echo "      Copied: $(basename "$lib_file")" || echo "      Failed to copy: $lib_file"
            fi
          done
          
          echo "  Verifying copied files..."
          if ls "$target_dir"/libtcmalloc*.dylib 1>/dev/null 2>&1; then
            echo "  Successfully copied libtcmalloc libraries:"
            ls -lh "$target_dir"/libtcmalloc*.dylib
          else
            echo "  Warning: No libtcmalloc libraries found after copy"
          fi
          
          cd - >/dev/null
          rm -rf /tmp/gperftools-bottle
        }
        
        for platform in "${platforms[@]}"; do
          if [ "$platform" == "portable" ]; then
            dotnet publish src/Neo.CLI/Neo.CLI.csproj -c Release -o "./publish/$platform" --self-contained false
          else
            dotnet publish src/Neo.CLI/Neo.CLI.csproj -c Release -o "./publish/$platform" -r "$platform" --self-contained true
          fi
          
          mkdir -p "./publish/$platform/Plugins/LevelDBStore"
          cp "$LEVELDB_OUTPUT/LevelDBStore.dll" "./publish/$platform/Plugins/LevelDBStore/" 2>/dev/null || true
          
          if [ "$platform" == "portable" ]; then
            copy_native_lib "linux-x64" "libleveldb.so" "./publish/$platform"
            copy_native_lib "win-x64" "libleveldb.dll" "./publish/$platform"
            copy_native_lib "osx-x64" "libleveldb.dylib" "./publish/$platform"
            download_gperftools "osx-x64" "./publish/$platform"
          else
            case "$platform" in
              "linux-x64"|"linux-arm64") copy_native_lib "$platform" "libleveldb.so" "./publish/$platform" ;;
              "win-x64") copy_native_lib "$platform" "libleveldb.dll" "./publish/$platform" ;;
              "osx-x64"|"osx-arm64")
                copy_native_lib "$platform" "libleveldb.dylib" "./publish/$platform"
                download_gperftools "$platform" "./publish/$platform"
                ;;
            esac
          fi
          
          cd "./publish/$platform" && zip -r "../../neo-cli-$platform.zip" . && cd ../..
        done
    - name: Upload CLI packages to release
      if: steps.check_tag.outputs.statusCode == '404'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        RELEASE_TAG="${{ steps.get_version.outputs.version }}"
        
        # Verify release exists
        if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
          echo "Error: Release $RELEASE_TAG does not exist"
          exit 1
        fi
        
        # Verify all required zip files exist
        missing_files=()
        for file in neo-cli-portable.zip neo-cli-linux-x64.zip neo-cli-linux-arm64.zip neo-cli-win-x64.zip neo-cli-osx-x64.zip neo-cli-osx-arm64.zip; do
          [ ! -f "$file" ] && missing_files+=("$file")
        done
        
        if [ ${#missing_files[@]} -gt 0 ]; then
          echo "Error: Missing zip files: ${missing_files[*]}"
          exit 1
        fi
        
        # Upload all zip files to release
        failed_files=()
        for file in neo-cli-portable.zip neo-cli-linux-x64.zip neo-cli-linux-arm64.zip neo-cli-win-x64.zip neo-cli-osx-x64.zip neo-cli-osx-arm64.zip; do
          if ! gh release upload "$RELEASE_TAG" "$file" --clobber; then
            failed_files+=("$file")
          fi
        done
        
        if [ ${#failed_files[@]} -gt 0 ]; then
          echo "Error: Failed to upload: ${failed_files[*]}"
          exit 1
        fi
    # - name: Publish to NuGet
    #   if: steps.check_tag.outputs.statusCode == '404'
    #   run: |
    #     dotnet pack -o out -c Release
    #     dotnet nuget push out/*.nupkg -s https://api.nuget.org/v3/index.json -k ${NUGET_TOKEN}
    #   env:
    #     NUGET_TOKEN: ${{ secrets.NUGET_TOKEN }}
